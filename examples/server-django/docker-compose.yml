version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tenxyte-mongodb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tenxyte-network

  redis:
    image: redis:7-alpine
    container_name: tenxyte-redis
    ports:
      - "6379:6379"
    networks:
      - tenxyte-network

  server:
    build: .
    container_name: tenxyte-server
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - tenxyte-network

  worker:
    build: .
    container_name: tenxyte-worker
    command: celery -A server worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - tenxyte-network

  beat:
    build: .
    container_name: tenxyte-beat
    command: celery -A server beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - tenxyte-network

volumes:
  mongo_data:

networks:
  tenxyte-network:
    driver: bridge
